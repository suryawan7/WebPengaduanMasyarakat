<!DOCTYPE html>
<html lang="id" class="">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Dashboard Petugas</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      darkMode: 'class',
      theme: {
        extend: {
          colors: {
            accent: '#00ffff',
            warning: '#facc15',
            success: '#22c55e',
            danger: '#ef4444',
          },
          dropShadow: {
            neon: '0 0 8px #00ffff, 0 0 16px #00ffff',
          }
        },
      },
    };
  </script>
</head>
<body class="bg-white dark:bg-gray-900 text-gray-800 dark:text-white flex min-h-screen transition-colors duration-300">

  <!-- Sidebar -->
  <aside class="w-64 bg-gray-800 text-white flex flex-col justify-between h-screen p-6 fixed drop-shadow-neon border-r border-accent">
    <div>
      <div class="mb-8 flex items-center space-x-3">
        <div id="profileInitial" class="w-12 h-12 rounded-full bg-white text-primary flex items-center justify-center font-bold text-black">?</div>
        <div>
          <h2 class="text-lg font-semibold" id="userName">Loading...</h2>
          <p class="text-sm text-gray-300">Petugas</p>
        </div>
      </div>
      <nav class="space-y-4">
        <button id="toggleTheme" class="w-full px-4 py-2 rounded bg-gray-700 hover:bg-white hover:text-gray-900 dark:hover:bg-white/10 transition">🌓 Mode</button>
        <a href="login.html" class="block px-4 py-2 rounded bg-danger text-center hover:bg-red-700 transition">Logout</a>
      </nav>
    </div>
  </aside>

  <!-- Main Content -->
  <main class="ml-64 flex-1 p-8 space-y-6">
    <header>
      <h1 class="text-2xl font-bold text-accent drop-shadow-neon">Dashboard Petugas</h1>
      <p class="text-sm text-gray-600 dark:text-white/70">Manajemen Seluruh Pengaduan</p>
    </header>

    <!-- Kartu Statistik -->
    <div id="statCards" class="grid grid-cols-1 md:grid-cols-3 gap-6 mb-6">
      <a href="laporan-masuk.html?from=petugas" class="block bg-blue-600 text-white p-6 rounded-xl shadow hover:opacity-90 transition drop-shadow-neon">
        <div class="flex items-center justify-between">
          <div>
            <h3 class="text-xl font-bold" id="totalLaporan">0 Laporan Masuk</h3>
            <p class="text-sm">Total Laporan Masuk</p>
          </div>
          <div class="text-4xl">💬</div>
        </div>
      </a>
      <a href="belum-ditanggapi.html?from=petugas" class="block bg-red-600 text-white p-6 rounded-xl shadow hover:opacity-90 transition drop-shadow-neon">
        <div class="flex items-center justify-between">
          <div>
            <h3 class="text-xl font-bold" id="belumTanggapi">0 Belum Ditanggapi</h3>
            <p class="text-sm">Belum Ditanggapi</p>
          </div>
          <div class="text-4xl">📋</div>
        </div>
      </a>
      <a href="sudah-ditanggapi.html?from=petugas" class="block bg-green-600 text-white p-6 rounded-xl shadow hover:opacity-90 transition drop-shadow-neon">
        <div class="flex items-center justify-between">
          <div>
            <h3 class="text-xl font-bold" id="sudahTanggapi">0 Sudah Ditanggapi</h3>
            <p class="text-sm">Sudah Ditanggapi</p>
          </div>
          <div class="text-4xl">✅</div>
        </div>
      </a>
    </div>

    <!-- Daftar Pengaduan -->
    <section class="bg-white dark:bg-gray-800 p-6 rounded-xl shadow border dark:border-accent drop-shadow-neon">
      <h2 class="text-lg font-semibold mb-4 text-gray-800 dark:text-accent drop-shadow-neon">📄 Daftar Seluruh Pengaduan</h2>
      <div class="overflow-x-auto">
        <table class="w-full text-sm table-auto border border-accent rounded-lg overflow-hidden">
          <thead class="bg-gray-100 dark:bg-gray-700 text-gray-800 dark:text-white">
            <tr>
              <th class="px-4 py-3 text-left">Username</th>
              <th class="px-4 py-3 text-left">Judul</th>
              <th class="px-4 py-3 text-left">Deskripsi</th>
              <th class="px-4 py-3 text-left">Status</th>
              <th class="px-4 py-3 text-left">Waktu</th>
              <th class="px-4 py-3 text-left">Bukti</th>
            </tr>
          </thead>
          <tbody id="petugasComplaintList"></tbody>
        </table>
      </div>
    </section>
  </main>

  <!-- Script: Tema + Username -->
  <script>
    document.addEventListener("DOMContentLoaded", () => {
      const root = document.documentElement;
      const savedTheme = localStorage.getItem("theme");

      // Terapkan tema awal
      if (savedTheme === "dark") {
        root.classList.add("dark");
      } else {
        root.classList.remove("dark");
      }

      // Toggle dark/light mode
      const toggleThemeBtn = document.getElementById("toggleTheme");
      if (toggleThemeBtn) {
        toggleThemeBtn.addEventListener("click", () => {
          root.classList.toggle("dark");
          localStorage.setItem("theme", root.classList.contains("dark") ? "dark" : "light");
        });
      }

      // Ambil user dari localStorage dan tampilkan
      const loggedUsername = localStorage.getItem("loggedInUser");
      const userList = JSON.parse(localStorage.getItem("users")) || [];
      const user = userList.find(u => u.username === loggedUsername);

      const userNameElement = document.getElementById("userName");
      const profileInitialElement = document.getElementById("profileInitial");

      if (user && user.username) {
        userNameElement.textContent = user.username;
        profileInitialElement.textContent = user.username.charAt(0).toUpperCase();
      } else {
        userNameElement.textContent = "Petugas";
        profileInitialElement.textContent = "?";
      }
    });
  </script>

  <!-- Script: Pengaduan -->
  <script src="dashboard-petugas.js" defer></script>
</body>
</html>
