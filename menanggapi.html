<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Tanggapi Laporan</title>
  <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-100 min-h-screen text-gray-800 dark:bg-gray-900 dark:text-white">
  <main class="max-w-3xl mx-auto p-6 space-y-6">
    <header class="flex items-center justify-between">
      <h1 class="text-2xl font-bold">Tanggapi Laporan</h1>
      <a href="belum-ditanggapi.html" class="px-4 py-2 rounded bg-blue-600 text-white hover:bg-blue-700">⬅️ Kembali</a>
    </header>

    <div id="reportContent" class="bg-white dark:bg-gray-800 p-6 rounded-xl shadow space-y-4">
      <p><strong>Nama:</strong> <span id="username">-</span></p>
      <p><strong>Judul:</strong> <span id="title">-</span></p>
      <p><strong>Deskripsi:</strong> <span id="description">-</span></p>
      <p><strong>Waktu:</strong> <span id="time">-</span></p>
      <p><strong>Status:</strong> <span id="status">-</span></p>

      <!-- Gambar Bukti -->
      <div>
        <strong>Gambar:</strong>
        <img id="reportImage" src="" alt="Gambar Laporan" class="mt-2 max-w-xs rounded-lg shadow cursor-pointer hidden" />
      </div>

      <form id="formTanggapan" class="space-y-4 mt-4">
        <label class="block">
          <span class="font-semibold">Tulis Tanggapan:</span>
          <textarea id="inputTanggapan" required rows="4" class="w-full mt-1 p-2 rounded bg-gray-100 dark:bg-gray-700 dark:text-white"></textarea>
        </label>
        <button type="submit" class="bg-blue-600 text-white px-4 py-2 rounded hover:bg-blue-700">Kirim Tanggapan & Tandai Selesai</button>
      </form>

      <!-- Modal sukses -->
      <div id="modalSuccess" class="fixed inset-0 bg-black/50 flex items-center justify-center hidden z-50">
        <div class="bg-white dark:bg-gray-800 p-6 rounded-lg shadow-lg text-center max-w-sm w-full">
          <h2 class="text-xl font-semibold text-green-600 dark:text-green-400 mb-4">Tanggapan Dikirim!</h2>
          <p class="text-gray-700 dark:text-white/80 mb-4">Laporan telah ditandai sebagai sudah ditanggapi.</p>
          <button id="modalCloseBtn" class="bg-green-600 hover:bg-green-700 text-white px-4 py-2 rounded">OK</button>
        </div>
      </div>
    </div>
  </main>

  <!-- Modal Preview Gambar -->
  <div id="imagePreviewModal" class="fixed inset-0 bg-black/80 flex items-center justify-center hidden z-50 cursor-pointer">
    <img id="previewImg" src="" alt="Preview Gambar" class="max-h-[90vh] max-w-[90vw] rounded-lg shadow-lg" />
  </div>

  <script src="menanggapi.js" defer></script>
</body>
</html>
