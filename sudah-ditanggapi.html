<!DOCTYPE html>
<html lang="id" class="dark">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Laporan Sudah Ditanggapi</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      darkMode: "class",
      theme: {
        extend: {
          colors: {
            accent: "#00ffff"
          }
        }
      }
    };
  </script>
</head>
<body class="bg-gray-100 dark:bg-gray-900 text-gray-800 dark:text-white min-h-screen transition-colors duration-300" data-status="Sudah Ditanggapi">
  <main class="max-w-6xl mx-auto p-6 space-y-6">
    <header class="flex items-center justify-between">
      <h1 class="text-2xl font-bold text-gray-800 dark:text-accent">✅ Sudah Ditanggapi</h1>
      <button id="backButton" class="px-4 py-2 rounded bg-accent text-black dark:text-white hover:bg-cyan-300 transition">⬅️ Kembali</button>
    </header>

    <section class="bg-white dark:bg-gray-800 p-6 rounded-xl shadow border dark:border-white/10">
      <h2 class="text-lg font-semibold mb-4 text-gray-800 dark:text-accent">Daftar Pengaduan Sudah Ditanggapi</h2>
      <div class="overflow-x-auto">
        <table class="w-full text-sm table-auto">
          <thead class="bg-gray-100 dark:bg-gray-700">
            <tr>
              <th class="px-4 py-3 text-left">Username</th>
              <th class="px-4 py-3 text-left">Judul</th>
              <th class="px-4 py-3 text-left">Deskripsi</th>
              <th class="px-4 py-3 text-left">Status</th>
              <th class="px-4 py-3 text-left">Waktu</th>
              <th class="px-4 py-3 text-left">Bukti</th>
              <th class="px-4 py-3 text-left">Aksi</th>
            </tr>
          </thead>
          <tbody id="filteredComplaintList"></tbody>
        </table>
      </div>
    </section>
  </main>

  <!-- Modal Preview Gambar -->
  <div id="imagePreviewModal" class="fixed inset-0 bg-black/90 text-white flex items-center justify-center z-50 hidden">
    <div class="relative max-w-3xl w-full bg-gray-900 rounded-lg shadow-xl p-4">
      <button id="closePreview" class="absolute top-2 right-2 text-white text-2xl font-bold bg-red-600 px-3 py-1 rounded hover:bg-red-700">✕</button>
      <img id="previewImage" src="" alt="Preview" class="w-full rounded border-4 border-white object-contain max-h-[80vh]" />
    </div>
  </div>

  <script src="laporan-filter.js" defer></script>
</body>
</html>
