<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Registrasi Petugas Baru</title>

  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      darkMode: 'class',
      theme: {
        extend: {
          colors: {
            primary: '#1e293b',
            accent: '#3b82f6',
            danger: '#ef4444',
            success: '#22c55e'
          }
        }
      }
    };
  </script>
</head>
<body class="bg-gray-100 text-gray-900 dark:bg-gray-900 dark:text-white min-h-screen flex items-center justify-center">

  <!-- Kontainer -->
  <div class="bg-white dark:bg-gray-800 p-8 rounded-xl shadow w-full max-w-md">
    <h1 class="text-2xl font-bold mb-6 text-center">Registrasi Petugas Baru</h1>

    <!-- Form -->
    <form id="regisPetugasForm" method="POST" action="regispetugas.php" class="space-y-4">
  <div>
    <label for="username" class="block mb-1">Username</label>
    <input type="text" id="username" name="username" class="w-full p-2 border rounded dark:bg-gray-900" required>
  </div>
  <div>
    <label for="email" class="block mb-1">Email</label>
    <input type="email" id="email" name="email" class="w-full p-2 border rounded dark:bg-gray-900" required>
  </div>
  <div>
    <label for="password" class="block mb-1">Password</label>
    <input type="password" id="password" name="password" minlength="8" class="w-full p-2 border rounded dark:bg-gray-900" required>
  </div>
  <button type="submit" class="bg-accent text-white px-4 py-2 rounded hover:bg-blue-700 w-full">Daftarkan Petugas</button>
</form>


    <!-- Link kembali -->
    <div class="text-center mt-4">
      <a href="dashboard-admin.html" class="text-accent hover:underline">⬅ Kembali ke Dashboard</a>
    </div>
  </div>

  <!-- Script -->
  <script src="mode.js"></script>
  <script src="regispetugas.js"></script>
</body>
</html>
